<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MediaFire Redirect</title>
</head>

<body>

<script>

// obtener parámetros de la URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){

document.body.innerHTML="Falta el parámetro id";

}else{

let link="";

// si es URL completa
if(id.includes("mediafire.com")){

link=id;

}else{

// si solo es el ID
link="https://www.mediafire.com/file/"+id;

}

// redirigir
window.location.href=link;

}

</script>

</body>
</html>
