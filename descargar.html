<?php
error_reporting(E_ALL);
ini_set('display_errors',1);

if(!isset($_GET['id'])){
    die("Falta parámetro ?id=");
}

$id = trim($_GET['id']);

/*
  Permite dos formas:

  1) URL completa:
     mediafire.php?id=https://www.mediafire.com/file/xxxxx/archivo.mp4/file

  2) Solo el ID:
     mediafire.php?id=xxxxx
*/

if(filter_var($id, FILTER_VALIDATE_URL)){
    // Si es URL completa
    $filelink = urldecode($id);
}else{
    // Si solo es el ID
    $filelink = "https://www.mediafire.com/file/".$id;
}


// obtener HTML
$ch = curl_init();
curl_setopt($ch, CURLOPT_URL, $filelink);
curl_setopt($ch, CURLOPT_RETURNTRANSFER, true);
curl_setopt($ch, CURLOPT_FOLLOWLOCATION, true);
curl_setopt($ch, CURLOPT_USERAGENT, "Mozilla/5.0");

$html = curl_exec($ch);
curl_close($ch);


// extraer enlace directo
preg_match('/https?:\/\/download[^"]+/i', $html, $matches);

$link = $matches[0] ?? "";


if($link){
    header("Location: ".$link);
    exit;
}else{
    echo "No se pudo obtener el enlace directo.";
}
?>
